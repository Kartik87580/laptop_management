<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – LRMS</title>
  <meta name="description" content="Sign in or create an account to access the Laptop Repair Management System." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #3b82f6, transparent);
      top: -100px; left: -100px;
      animation: float1 8s ease-in-out infinite;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b5cf6, transparent);
      bottom: -80px; right: -80px;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0,0); }
      50%       { transform: translate(40px, 30px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0,0); }
      50%       { transform: translate(-30px, -40px); }
    }

    /* Card */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
      padding: 40px 36px 36px;
      position: relative;
      z-index: 10;
    }

    /* Logo */
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .auth-logo .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff;
      box-shadow: 0 4px 15px rgba(37,99,235,.4);
    }
    .auth-logo .logo-text { font-size: 20px; font-weight: 700; color: #f1f5f9; }
    .auth-logo .logo-sub  { font-size: 11px; color: #64748b; }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .auth-tab {
      flex: 1;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .auth-tab.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      box-shadow: 0 2px 8px rgba(37,99,235,.4);
    }

    /* Panel */
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    .auth-title {
      font-size: 22px; font-weight: 700; color: #f1f5f9;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 13px; color: #64748b;
      margin-bottom: 24px;
    }

    /* Form Elements */
    .field-group { margin-bottom: 16px; }
    .field-group label {
      display: block;
      font-size: 12.5px; font-weight: 500; color: #94a3b8;
      margin-bottom: 6px;
    }
    .field-wrap {
      position: relative;
    }
    .field-wrap i {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: #475569; font-size: 15px; pointer-events: none;
    }
    .auth-input {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      color: #f1f5f9;
      border-radius: 9px;
      padding: 10px 12px 10px 40px;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, background .2s, box-shadow .2s;
      outline: none;
    }
    .auth-input::placeholder { color: #475569; }
    .auth-input:focus {
      border-color: #3b82f6;
      background: rgba(59,130,246,.08);
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }
    .auth-input.is-invalid {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,.15);
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #475569;
      font-size: 15px; cursor: pointer; padding: 2px;
      transition: color .15s;
    }
    .pw-toggle:hover { color: #94a3b8; }
    .auth-input.has-toggle { padding-right: 40px; }

    /* Error message */
    .auth-error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .auth-error.visible { display: flex; }

    /* Submit button */
    .auth-btn {
      width: 100%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 11px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 15px rgba(37,99,235,.35);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .auth-btn:hover  { opacity: .9; box-shadow: 0 6px 20px rgba(37,99,235,.45); }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* Spinner inside button */
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .auth-btn.loading .btn-spinner { display: block; }
    .auth-btn.loading .btn-label  { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .auth-divider {
      text-align: center; font-size: 12px; color: #334155;
      margin: 20px 0 0;
    }

    /* Success overlay */
    .auth-success {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px 0;
    }
    .auth-success.visible { display: flex; }
    .success-icon {
      width: 64px; height: 64px;
      background: rgba(22,163,74,.15);
      border: 2px solid rgba(22,163,74,.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #4ade80;
      margin-bottom: 16px;
      animation: popIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .success-title { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
    .success-sub   { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>

  <div class="auth-card" id="authCard">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-icon"><i class="bi bi-laptop"></i></div>
      <div>
        <div class="logo-text">LRMS</div>
        <div class="logo-sub">Laptop Repair Management</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">
        <i class="bi bi-person-plus me-1"></i> Sign Up
      </button>
    </div>

    <!-- ── LOGIN PANEL ── -->
    <div class="auth-panel active" id="panelLogin">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Enter your credentials to continue.</p>

      <div class="auth-error" id="loginError">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="loginErrorMsg"></span>
      </div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="loginEmail">Email Address</label>
          <div class="field-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" id="loginEmail" class="auth-input" placeholder="you@example.com" autocomplete="email" required />
          </div>
        </div>
        <div class="field-group">
          <label for="loginPassword">Password</label>
          <div class="field-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" id="loginPassword" class="auth-input has-toggle" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-btn" id="loginBtn">
          <span class="btn-spinner"></span>
          <span class="btn-label"><i class="bi bi-box-arrow-in-right"></i> Sign In</span>
        </button>
      </form>

      <p class="auth-divider">Don't have an account? <a href="#" onclick="switchTab('signup'); return false;" style="color:#60a5fa;">Sign Up</a></p>
    </div>

    <!-- ── SIGNUP PANEL ── -->
    <div class="auth-panel" id="panelSignup">
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Get started — it's free.</p>

      <div class="auth-error" id="signupError">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="signupErrorMsg"></span>
      </div>

      <div id="signupFormWrap">
        <form id="signupForm" novalidate>
          <div class="field-group">
            <label for="signupUsername">Username</label>
            <div class="field-wrap">
              <i class="bi bi-person"></i>
              <input type="text" id="signupUsername" class="auth-input" placeholder="e.g. karthik" autocomplete="username" required maxlength="50" />
            </div>
          </div>
          <div class="field-group">
            <label for="signupEmail">Email Address</label>
            <div class="field-wrap">
              <i class="bi bi-envelope"></i>
              <input type="email" id="signupEmail" class="auth-input" placeholder="you@example.com" autocomplete="email" required />
            </div>
          </div>
          <div class="field-group">
            <label for="signupPassword">Password <span style="color:#475569;font-weight:400">(min. 6 chars)</span></label>
            <div class="field-wrap">
              <i class="bi bi-lock"></i>
              <input type="password" id="signupPassword" class="auth-input has-toggle" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
              <button type="button" class="pw-toggle" onclick="togglePw('signupPassword', this)" tabindex="-1">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="auth-btn" id="signupBtn">
            <span class="btn-spinner"></span>
            <span class="btn-label"><i class="bi bi-person-plus"></i> Create Account</span>
          </button>
        </form>
      </div>

      <!-- Success state shown after signup -->
      <div class="auth-success" id="signupSuccess">
        <div class="success-icon"><i class="bi bi-check-lg"></i></div>
        <div class="success-title">Account created!</div>
        <div class="success-sub">Redirecting to the dashboard…</div>
      </div>

      <p class="auth-divider" id="signupSwitchHint">Already have an account? <a href="#" onclick="switchTab('login'); return false;" style="color:#60a5fa;">Sign In</a></p>
    </div>

  </div><!-- /auth-card -->

  <script type="module">
    import { login, signup, getSession } from './assets/js/auth.js';

    // Redirect if already logged in
    if (getSession()) window.location.replace('index.html');

    /* ──── Tab switching ──── */
    window.switchTab = function(tab) {
      document.getElementById('panelLogin').classList.toggle('active',  tab === 'login');
      document.getElementById('panelSignup').classList.toggle('active', tab === 'signup');
      document.getElementById('tabLogin').classList.toggle('active',  tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      hideError('login');
      hideError('signup');
    };

    /* ──── Password toggle ──── */
    window.togglePw = function(inputId, btn) {
      const inp = document.getElementById(inputId);
      const isHidden = inp.type === 'password';
      inp.type = isHidden ? 'text' : 'password';
      btn.querySelector('i').className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
    };

    /* ──── Error helpers ──── */
    function showError(form, msg) {
      document.getElementById(`${form}Error`).classList.add('visible');
      document.getElementById(`${form}ErrorMsg`).textContent = msg;
    }
    function hideError(form) {
      const el = document.getElementById(`${form}Error`);
      if (el) el.classList.remove('visible');
    }

    /* ──── Button loading state ──── */
    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    /* ──── Login ──── */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('login');
      const btn   = document.getElementById('loginBtn');
      const email = document.getElementById('loginEmail').value;
      const pw    = document.getElementById('loginPassword').value;

      setLoading(btn, true);
      const result = await login(email, pw);
      setLoading(btn, false);

      if (result.success) {
        btn.innerHTML = '<i class="bi bi-check-lg"></i> <span class="btn-label">Success!</span>';
        setTimeout(() => window.location.href = 'index.html', 600);
      } else {
        showError('login', result.error);
        document.getElementById('loginPassword').classList.add('is-invalid');
      }
    });

    // Clear invalid state on typing
    document.getElementById('loginPassword').addEventListener('input', () =>
      document.getElementById('loginPassword').classList.remove('is-invalid')
    );

    /* ──── Signup ──── */
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError('signup');
      const btn      = document.getElementById('signupBtn');
      const username = document.getElementById('signupUsername').value;
      const email    = document.getElementById('signupEmail').value;
      const pw       = document.getElementById('signupPassword').value;

      setLoading(btn, true);
      const result = await signup(username, email, pw);
      setLoading(btn, false);

      if (result.success) {
        document.getElementById('signupFormWrap').style.display = 'none';
        document.getElementById('signupSwitchHint').style.display = 'none';
        document.getElementById('signupSuccess').classList.add('visible');
        setTimeout(() => window.location.href = 'index.html', 1800);
      } else {
        showError('signup', result.error);
      }
    });
  </script>

</body>
</html>
