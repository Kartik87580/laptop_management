<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard – LRMS</title>
  <meta name="description" content="Laptop Repair Management System – Dashboard overview of all repair jobs." />
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
<div class="layout-wrapper">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-laptop"></i></div>
      <div>
        <div class="brand-text">LRMS</div>
        <div class="brand-sub">Repair Management</div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="index.html"          class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="repairs.html"        class="nav-link"><i class="bi bi-list-ul"></i> All Repairs</a>
      <a href="add-repair.html"     class="nav-link"><i class="bi bi-plus-circle"></i> Add Repair</a>
    </div>

    <div class="sidebar-footer">
      <div id="sidebarUserInfo" style="margin-bottom:8px;font-size:11px;color:#475569;"></div>
      <button onclick="handleLogout()" class="btn btn-sm w-100" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5;font-size:12px;">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
      <div style="margin-top:10px;">&copy; 2026 LRMS &nbsp;·&nbsp; v1.0</div>
    </div>
  </nav>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ═══════════ MAIN ═══════════ -->
  <div class="main-content">

    <!-- Top Bar -->
    <div class="topbar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>
      <span class="page-title">Dashboard</span>
      <div class="topbar-right">
        <a href="add-repair.html" class="btn btn-primary btn-sm">
          <i class="bi bi-plus-lg"></i> New Repair
        </a>
      </div>
    </div>

    <!-- Page Body -->
    <div class="page-body">

      <!-- Stat Cards -->
      <div class="row g-3 mb-4" id="statsRow">
        <!-- Populated by JS -->
        <div class="col-12 text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </div>

      <!-- Recent Repairs -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title"><i class="bi bi-clock-history me-2"></i>Recent Repairs</h2>
          <a href="repairs.html" class="btn btn-outline-secondary btn-sm">View All</a>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="lrms-table">
              <thead>
                <tr>
                  <th>Job ID</th>
                  <th>Customer</th>
                  <th>Phone</th>
                  <th>Brand / Model</th>
                  <th>Status</th>
                  <th>Received</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="recentTableBody">
                <tr><td colspan="7" class="text-center py-4">
                  <div class="spinner-border spinner-border-sm text-secondary"></div>
                </td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div><!-- /page-body -->
  </div><!-- /main-content -->
</div><!-- /layout-wrapper -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { initSidebar, setActiveNav, statusBadge, formatDate, escapeHtml, showToast, emptyStateHtml } from './assets/js/ui.js';
  import { getDashboardStats, getRecentRepairs } from './assets/js/db.js';
  import { requireAuth, getSession, logout } from './assets/js/auth.js';

  requireAuth();
  const _session = getSession();
  window.handleLogout = logout;
  document.addEventListener('DOMContentLoaded', () => {
    const info = document.getElementById('sidebarUserInfo');
    if (info && _session) info.textContent = '\u2022 ' + (_session.username || _session.email);
  });

  document.addEventListener('DOMContentLoaded', async () => {
    initSidebar();
    setActiveNav();
    await loadDashboard();
  });

  async function loadDashboard() {
    try {
      const [stats, recent] = await Promise.all([getDashboardStats(), getRecentRepairs()]);
      renderStats(stats);
      renderRecentTable(recent);
    } catch (err) {
      console.error(err);
      showToast('Failed to load dashboard data. Check your Neon connection.', 'error');
      document.getElementById('statsRow').innerHTML = `<div class="col-12"><div class="alert alert-danger">Could not connect to database. Please check your <code>config.js</code>.</div></div>`;
      document.getElementById('recentTableBody').innerHTML = `<tr><td colspan="7">${emptyStateHtml('Database connection failed.')}</td></tr>`;
    }
  }

  function renderStats(s) {
    const cards = [
      { label: 'Total Repairs',    value: s.total,          icon: 'bi-tools',           color: 'blue'   },
      { label: 'Pending',          value: s.received + s.diagnosing + s.waitingForParts,
                                                              icon: 'bi-hourglass-split', color: 'orange' },
      { label: 'Repairing',        value: s.repairing,       icon: 'bi-wrench',          color: 'purple' },
      { label: 'Ready',            value: s.ready,           icon: 'bi-check2-circle',   color: 'green'  },
      { label: 'Delivered',        value: s.delivered,       icon: 'bi-box-seam',        color: 'cyan'   },
      { label: 'Cancelled',        value: s.cancelled || 0,  icon: 'bi-x-circle',        color: 'red'    },
    ];

    document.getElementById('statsRow').innerHTML = cards.map(c => `
      <div class="col-6 col-md-4 col-lg">
        <div class="stat-card">
          <div class="stat-icon ${c.color}"><i class="bi ${c.icon}"></i></div>
          <div>
            <div class="stat-value">${c.value}</div>
            <div class="stat-label">${c.label}</div>
          </div>
        </div>
      </div>`).join('');
  }

  function renderRecentTable(rows) {
    const tbody = document.getElementById('recentTableBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="7">${emptyStateHtml('No repairs yet. Add your first job!')}</td></tr>`;
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td><span class="job-id">${escapeHtml(r.job_id)}</span></td>
        <td>${escapeHtml(r.customer_name)}</td>
        <td>${escapeHtml(r.phone)}</td>
        <td>${escapeHtml(r.brand)} ${escapeHtml(r.model)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${formatDate(r.received_date)}</td>
        <td>
          <div class="action-btns">
            <a href="repair-details.html?id=${r.id}" class="btn btn-outline-primary btn-sm" title="View">
              <i class="bi bi-eye"></i>
            </a>
            <a href="edit-repair.html?id=${r.id}" class="btn btn-outline-secondary btn-sm" title="Edit">
              <i class="bi bi-pencil"></i>
            </a>
          </div>
        </td>
      </tr>`).join('');
  }
</script>
</body>
</html>
